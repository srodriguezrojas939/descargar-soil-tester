<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:max-content;
    height:max-content;
    overflow:hidden;
    background:transparent;
    font-family:'Oswald',sans-serif;
}

.card{
    width:260px;
    padding:20px;
    background:#fff;
    border-radius:18px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.12);
}

h1{
    font-size:24px;
    margin:0 0 18px;
    color:#000;
}

.download-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
}

.download-btn svg{
    width:58px;
    height:58px;
    color:rgb(56,72,57);
    transition:.2s;
}

.download-btn:hover svg{
    transform:scale(1.12);
}
</style>
</head>
<body>

<div class="card">
    <h1>Descargar APP Sensor</h1>

    <a class="download-btn"
       href="./Soil_Detector_1.0.1.apk"
       download>
        <i data-lucide="download"></i>
    </a>
</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
